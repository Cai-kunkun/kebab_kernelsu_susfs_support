# .github/workflows/build-kernel.yml
#
# 只编译内核(不构建完整 LineageOS 系统)
# 适用于:OnePlus 8T (kebab, SM8250),LineageOS 23.2 内核源码 (android_kernel_oneplus_sm8250)
#
# ⚠️ 重要提示(已核实):有人在 XDA 论坛记录过用完全相同的仓库/分支
# (LineageOS/android_kernel_oneplus_sm8250 @ lineage-23.2)集成 KernelSU-Next + SUSFS 的过程,
# 提到应用 susfs4ksu 补丁时遇到了大量 rejected hunks,需要手动解决冲突。
# 也就是说:下面 apply_susfs 这一步很可能不会一次就干净地 apply 成功,CI 里自动
# patch 失败是预期情况,不代表你的配置有问题。
#
# 建议的实际工作方式:
#   1) 先在本地(或者跑一次这个 workflow 让它失败)得到冲突信息,手动解决 rejected hunks;
#   2) 把解决完冲突、已经集成好 KernelSU+SUSFS 的内核提交到你自己的 fork 分支;
#   3) 之后 kernel_repo/kernel_branch 直接指向你这个已经集成好的 fork,
#      apply_kernelsu / apply_susfs 都设为 false —— 这样每次 CI 运行只是纯编译,稳定且快。
# 下面保留自动下载补丁的步骤是为了方便你第一次跑 CI 时定位冲突,而不是保证每次都能无人值守跑通。
#
# 触发方式:
#   - push 到 main 分支时自动跑一次(用的是下面各个 xxx_default 值)。
#   - 也可以去 Actions 页面手动点 "Run workflow",这时候可以在页面上改任意参数
#     (kernel_repo / kernel_branch / defconfig / 是否打 KernelSU-Next+SUSFS 等)。
#   如果你的内核仓库不叫 main 分支,或者想用别的分支触发,改下面 push.branches 即可。

name: Build kebab kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: "内核源码仓库地址"
        required: true
        default: "https://github.com/LineageOS/android_kernel_oneplus_sm8250"
      kernel_branch:
        description: "内核源码分支"
        required: true
        default: "lineage-23.2"
      defconfig:
        description: "defconfig 名称,空格分隔可传多个一起合并(比如加上 vendor/oplus.config)"
        required: true
        default: "vendor/kona-perf_defconfig vendor/oplus.config"
      apply_kernelsu:
        description: "是否应用 KernelSU-Next 集成脚本"
        type: boolean
        default: false
      ksu_setup_url:
        description: "KernelSU-Next setup.sh 地址"
        required: false
        default: "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh"
      ksu_setup_arg:
        description: "传给 setup.sh 的分支参数(4.19 这种老内核官方文档建议用 legacy;也可填 stable/dev/具体 tag)"
        required: false
        default: "legacy"
      ksu_dir_name:
        description: "setup.sh 把 KernelSU-Next 拉到内核根目录下的文件夹名(KernelSU-Next 默认就叫这个,别的 fork 可能叫 KernelSU)"
        required: false
        default: "KernelSU-Next"
      apply_susfs:
        description: "是否自动下载并应用 SUSFS 补丁"
        type: boolean
        default: false
      susfs_branch:
        description: "susfs4ksu 仓库分支(kernel-4.19 已确认存在)"
        required: false
        default: "kernel-4.19"
      susfs_kernel_patch:
        description: "susfs4ksu/kernel_patches 下对应内核版本的补丁文件名"
        required: false
        default: "50_add_susfs_in_kernel-4.19.patch"
      kernel_local_version:
        description: "自定义内核版本后缀,带前导 -,比如填 -MyKernel 会让 uname -r 显示成 4.19.325-MyKernel(会清空原本 cip132-st16-perf 那一长串);留空则保留仓库原本的版本字符串"
        required: false
        default: ""

env:
  ARCH: arm64
  OUT_DIR: out
  CLANG_REPO: https://github.com/kdrag0n/proton-clang.git
  CLANG_BRANCH: master
  CLANG_DIR: clang
  # push 触发时没有 github.event.inputs,所以每个可配置项都用 || 兜底到默认值,
  # 这样 push 和手动 workflow_dispatch 触发用的是同一套逻辑。
  KERNEL_REPO: ${{ github.event.inputs.kernel_repo || 'https://github.com/LineageOS/android_kernel_oneplus_sm8250' }}
  KERNEL_BRANCH: ${{ github.event.inputs.kernel_branch || 'lineage-23.2' }}
  DEFCONFIG: ${{ github.event.inputs.defconfig || 'vendor/kona-perf_defconfig vendor/oplus.config' }}
  APPLY_KERNELSU: ${{ github.event.inputs.apply_kernelsu || 'false' }}
  KSU_SETUP_URL: ${{ github.event.inputs.ksu_setup_url || 'https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh' }}
  KSU_SETUP_ARG: ${{ github.event.inputs.ksu_setup_arg || 'legacy' }}
  KSU_DIR_NAME: ${{ github.event.inputs.ksu_dir_name || 'KernelSU-Next' }}
  APPLY_SUSFS: ${{ github.event.inputs.apply_susfs || 'false' }}
  SUSFS_BRANCH: ${{ github.event.inputs.susfs_branch || 'kernel-4.19' }}
  SUSFS_KERNEL_PATCH: ${{ github.event.inputs.susfs_kernel_patch || '50_add_susfs_in_kernel-4.19.patch' }}
  KERNEL_LOCAL_VERSION: ${{ github.event.inputs.kernel_local_version || '' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git gnupg gperf lib32ncurses5-dev lib32readline-dev lib32z1-dev \
            libelf-dev libssl-dev liblz4-tool libncurses5-dev libsdl1.2-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev python3 python-is-python3 coccinelle

      - name: 检出内核源码
        # actions/checkout 的 repository 参数只接受 "owner/repo" 格式,不接受完整 URL,
        # 而 KERNEL_REPO 默认值是完整 URL(方便以后换成别的 git host 上的 fork),
        # 所以这里直接用 git clone,兼容任意 URL。
        run: |
          git clone --depth=1 -b "${KERNEL_BRANCH}" "${KERNEL_REPO}" kernel

      # uname -r 显示的完整版本号 = Makefile 里的 VERSION.PATCHLEVEL.SUBLEVEL(即 4.19.325,
      # 这三个数字来自源码本身,不建议改) + Makefile 里的 EXTRAVERSION 字段(默认帮你带出了
      # "-cip132-st16" 这种一大串) + 下面 config 里 CONFIG_LOCALVERSION 追加的部分。
      # 这里先把 EXTRAVERSION 清空,后面在生成完 defconfig 后把 CONFIG_LOCALVERSION
      # 设成你自定义的值,两步加起来就等于完全替换掉 4.19.325 后面那一整段。
      - name: 自定义内核版本号(可选)
        if: ${{ env.KERNEL_LOCAL_VERSION != '' }}
        working-directory: kernel
        run: |
          sed -i 's/^EXTRAVERSION =.*/EXTRAVERSION =/' Makefile
          grep '^EXTRAVERSION' Makefile

      - name: 拉取 clang 工具链
        run: |
          git clone --depth=1 -b "${CLANG_BRANCH}" "${CLANG_REPO}" "${CLANG_DIR}"
          echo "$(pwd)/${CLANG_DIR}/bin" >> "$GITHUB_PATH"

      - name: 启用 ccache
        run: |
          sudo apt-get install -y ccache
          ccache -M 5G
          echo "USE_CCACHE=1" >> "$GITHUB_ENV"
          echo "CCACHE_EXEC=$(command -v ccache)" >> "$GITHUB_ENV"

      # 报错 "No hooks were defined, please integrate manual hooks in your kernel!"
      # 是因为 legacy 分支的 KernelSU-Next 不走 kprobe 自动 hook,必须手动在
      # fs/exec.c / fs/open.c / fs/read_write.c / fs/stat.c 里插入调用 KernelSU 钩子函数
      # 的代码,官方文档里那几个 diff 是针对特定内核版本写的,直接怼上去大概率跟你
      # 这颗 4.19 内核对不上,会跟前面 susfs 补丁一样出现 rejected hunks。
      # 这里改用 devnoname120/kernelsu-coccinelle 这个项目:它用 Coccinelle(语义补丁,
      # 按代码结构匹配而不是逐行 diff)来打这几个 hook,兼容 3.18~5.15 内核,不挑
      # 具体版本、注释、变量名这些细节,基本不会有 rejected hunks 的问题。
      # 官方 README 特别强调:必须在"干净"的内核源码上打(不能已经打过 KernelSU/susfs
      # 补丁),所以这一步必须放在 setup.sh 和 SUSFS 补丁之前。
      - name: 应用 KernelSU 底层 syscall hook(coccinelle,可选)
        if: ${{ env.APPLY_KERNELSU == 'true' }}
        run: |
          git clone --depth=1 https://github.com/devnoname120/kernelsu-coccinelle.git
          cd kernelsu-coccinelle/classic-hooks
          ./apply.sh ../../kernel

      - name: 应用 KernelSU-Next(可选)
        if: ${{ env.APPLY_KERNELSU == 'true' }}
        working-directory: kernel
        run: |
          curl -LSs "${KSU_SETUP_URL}" | bash -s "${KSU_SETUP_ARG}"

      # SUSFS 自动下载并集成。kernel-4.19 分支在 susfs4ksu 官方仓库确实存在,
      # 但请注意:官方文档里也明确说明非 GKI 内核打这个补丁经常会有 rejected hunks,
      # 需要手动核对/修复冲突(尤其是 struct 里缺 android_kabi_reservedX 占位字段的情况)。
      # 也就是说这一步不保证一次成功,CI 报错时请去 Actions 日志里看具体是哪个 .rej 文件、
      # 手动修好后再提交回内核仓库,而不是无限重跑这个 workflow。
      #
      # 另外:KernelSU-Next 较新版本可能已经内置了 susfs 的 hook 支持(不需要额外打
      # 10_enable_susfs_for_ksu.patch),所以这一步补丁应用失败时先去 KernelSU-Next 里
      # 搜一下有没有 CONFIG_KSU_SUSFS 相关代码,再判断是不是真的需要这个补丁。
      - name: 拉取并应用 SUSFS(可选)
        if: ${{ env.APPLY_SUSFS == 'true' }}
        run: |
          git clone --depth=1 -b "${SUSFS_BRANCH}" \
            https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu

          # 1. 拷贝 susfs 的内核态源码文件
          cp susfs4ksu/kernel_patches/fs/* kernel/fs/ 2>/dev/null || true
          cp susfs4ksu/kernel_patches/include/linux/* kernel/include/linux/ 2>/dev/null || true

          # 2. 给内核本体打 susfs 补丁
          cp "susfs4ksu/kernel_patches/${SUSFS_KERNEL_PATCH}" kernel/
          cd kernel
          patch -p1 < "${SUSFS_KERNEL_PATCH}"
          cd ..

          # 3. 给 KernelSU-Next 打启用 susfs 的补丁(需要先执行过上面的 KernelSU 步骤)
          KSU_DIR="kernel/${KSU_DIR_NAME}"
          if [ -d "$KSU_DIR" ]; then
            cp susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch "$KSU_DIR/" 2>/dev/null || true
            if [ -f "$KSU_DIR/10_enable_susfs_for_ksu.patch" ]; then
              cd "$KSU_DIR"
              patch -p1 < 10_enable_susfs_for_ksu.patch || \
                echo "打补丁失败:KernelSU-Next 可能已经内置 susfs 支持,或者补丁需要手动解决冲突,请查看上面日志。"
              cd - > /dev/null
            fi
          else
            echo "未发现 $KSU_DIR 目录:请确认已开启 apply_kernelsu,且 ksu_dir_name 和 setup.sh 实际拉取的目录名一致。"
          fi

      - name: 生成 defconfig
        working-directory: kernel
        # 不加引号是有意的:DEFCONFIG 里空格分隔的多个 config(比如
        # "vendor/kona-perf_defconfig vendor/oplus.config")需要被当成多个独立参数传给 make,
        # 才会按 kbuild 的 fragment 合并方式依次叠加,而不是被当成一个不存在的文件名。
        run: |
          make O=${OUT_DIR} ARCH=${ARCH} CC=clang ${DEFCONFIG}

      # defconfig 本身大概率不会带 CONFIG_KSU / CONFIG_KSU_SUSFS,需要在编译前手动打开。
      # KSU_SUSFS_* 各个子功能开关按需增删,这里只启用了最常用的一批。
      # CONFIG_LOCALVERSION_AUTO 默认是开的,开着的话内核还会自动在版本号后面拼一段
      # git commit 相关的后缀,所以自定义版本号时要把它关掉,否则你的自定义名称后面
      # 还会跟一串奇怪的 hash。
      - name: 应用自定义配置(KernelSU-Next / SUSFS / 版本号)
        if: ${{ env.APPLY_KERNELSU == 'true' || env.APPLY_SUSFS == 'true' || env.KERNEL_LOCAL_VERSION != '' }}
        working-directory: kernel
        run: |
          CONFIG="./scripts/config --file ${OUT_DIR}/.config"
          if [ "${APPLY_KERNELSU}" = "true" ]; then
            $CONFIG -e KSU
          fi
          if [ "${APPLY_SUSFS}" = "true" ]; then
            $CONFIG -e KSU_SUSFS
            $CONFIG -e KSU_SUSFS_SUS_PATH
            $CONFIG -e KSU_SUSFS_SUS_MOUNT
            $CONFIG -e KSU_SUSFS_SUS_KSTAT
            $CONFIG -e KSU_SUSFS_TRY_UMOUNT
          fi
          if [ -n "${KERNEL_LOCAL_VERSION}" ]; then
            $CONFIG -d LOCALVERSION_AUTO
            $CONFIG --set-str LOCALVERSION "${KERNEL_LOCAL_VERSION}"
          fi
          make O=${OUT_DIR} ARCH=${ARCH} CC=clang olddefconfig

      - name: 编译内核
        working-directory: kernel
        run: |
          # proton-clang 自带的交叉编译前缀是 aarch64-linux-gnu- / arm-linux-androideabi-
          make -j"$(nproc --all)" O=${OUT_DIR} ARCH=${ARCH} \
            CC="ccache clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LLVM=1 LLVM_IAS=1

      - name: 收集产物
        run: |
          mkdir -p artifacts
          cp kernel/${OUT_DIR}/arch/arm64/boot/Image artifacts/ 2>/dev/null || true
          cp kernel/${OUT_DIR}/arch/arm64/boot/Image.gz-dtb artifacts/ 2>/dev/null || true
          cp kernel/${OUT_DIR}/arch/arm64/boot/dtbo.img artifacts/ 2>/dev/null || true
          ls -la artifacts

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: kebab-kernel-${{ github.run_number }}
          path: artifacts/*
          if-no-files-found: error
