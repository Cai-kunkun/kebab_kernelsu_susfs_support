name: Build kebab kernel

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: official
        type: choice
        options:
          - official
          - ksu-susfs
          - both

  push:
    branches:
      - main
      - master

  schedule:
    - cron: "0 0 * * 0"


jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        profile:
          - ${{ github.event.inputs.profile || 'official' }}


    steps:

    - name: Checkout builder
      uses: actions/checkout@v4


    - name: Install dependencies
      run: |
        sudo apt update

        sudo apt install -y \
          bc \
          bison \
          flex \
          build-essential \
          ccache \
          curl \
          git \
          libssl-dev \
          libelf-dev \
          python3 \
          rsync \
          clang \
          llvm \
          lld


    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: kernel-kebab


    - name: Clone kernel source
      run: |
        git clone \
          --depth=1 \
          -b lineage-23.2 \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          kernel


        cd kernel


        echo "========== Kernel information =========="

        echo "Commit:"
        git rev-parse HEAD

        echo "Branch:"
        git branch


        echo ""
        echo "========== QCOM driver history =========="


        echo "schgm-flash.c:"
        git log --oneline -- drivers/power/supply/qcom/schgm-flash.c | head -5 || true


        echo ""
        echo "smb-lib.h:"
        git log --oneline -- drivers/power/supply/qcom/smb-lib.h | head -5 || true


        echo ""
        echo "========== Symbol check =========="


        echo "smb_charger definition:"
        grep -n "struct smb_charger {" \
          drivers/power/supply/qcom/smb-lib.h || true


        echo ""
        echo "smb_irq_data definition:"
        grep -R "struct smb_irq_data {" \
          drivers/power/supply/qcom/ || true


        echo ""
        echo "smblib_read:"
        grep -n "smblib_read" \
          drivers/power/supply/qcom/smb-lib.h || true


        echo ""
        echo "========== Toolchain =========="

        clang --version
        ld.lld --version



    - name: Build kernel
      env:
        PROFILE: ${{ matrix.profile }}

      run: |
        chmod +x scripts/*.sh

        ./scripts/setup.sh

        ./scripts/build.sh



    - name: Check kernel output
      if: always()
      run: |
        ls -lah kernel/out/arch/arm64/boot/ || true



    - name: Upload kernel image
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: kebab-${{ matrix.profile }}
        path: |
          kernel/out/arch/arm64/boot/Image.gz*